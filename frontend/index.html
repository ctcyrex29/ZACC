<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZACC Integrity Nexus | Anonymous Protection</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }

    body {
      margin: 0;
      background-color: #f8fafc;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
    }

    .glass-card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .subtle-grid {
      background-image: radial-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 0);
      background-size: 40px 40px;
    }

    .soft-glow {
      box-shadow: 0 0 50px -10px rgba(16, 185, 129, 0.2);
    }

    input,
    select,
    textarea {
      background: #ffffff;
      color: #0f172a;
      border-color: #cbd5e1;
    }

    .dark input,
    .dark select,
    .dark textarea {
      background: rgba(4, 6, 11, 0.8);
      color: #e2e8f0;
      border-color: rgba(255, 255, 255, 0.12);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .tracking-tighter {
      letter-spacing: -0.05em;
    }

    .tracking-widest {
      letter-spacing: 0.2em;
    }
  </style>
</head>

<body class="subtle-grid">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
